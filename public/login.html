<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    .auth-card h2 {
      margin: 0 0 24px;
      font-size: 1.4rem;
    }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .auth-tab.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
  </style>
</head>

<body>
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:20px">
      <a href="/" style="text-decoration:none;font-size:1.1rem;color:var(--text-primary)">🌐 <span id="siteTitle"
          data-i18n="nav.siteName">域名分发站</span></a>
      <div style="margin-top:8px">
        <button id="langToggleBtn" class="btn btn-secondary btn-sm" title="Language">EN</button>
        <button id="themeToggleBtn" class="btn btn-secondary btn-sm" title="Theme">☀️</button>
      </div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="showTab('login')" data-i18n="nav.login">登录</button>
      <button class="auth-tab" id="tabRegister" onclick="showTab('register')" data-i18n="nav.register">注册</button>
    </div>

    <!-- 登录表单 -->
    <div id="loginForm">
      <form onsubmit="doLogin();return false;" autocomplete="on">
        <div class="form-group">
          <label data-i18n="login.username">用户名</label>
          <input type="text" class="form-control" id="loginUsername" data-i18n-placeholder="login.usernamePlaceholder"
            placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
          <label data-i18n="login.password">密码</label>
          <input type="password" class="form-control" id="loginPassword"
            data-i18n-placeholder="login.passwordPlaceholder" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" data-i18n="login.submit">登 录</button>
      </form>
      <div id="oauthSection" style="display:none;margin-top:16px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="flex:1;height:1px;background:var(--border-color)"></div>
          <span style="color:var(--text-muted);font-size:0.85rem" data-i18n="or">或</span>
          <div style="flex:1;height:1px;background:var(--border-color)"></div>
        </div>
        <a href="/api/oauth/login" class="btn btn-secondary"
          style="width:100%;text-align:center;text-decoration:none;margin-bottom:8px" data-i18n="login.oauth.linuxdo">
          🔗 使用 Linux.Do 登录
        </a>
        <a id="githubLoginBtn" href="/api/github/login" class="btn btn-secondary"
          style="width:100%;text-align:center;text-decoration:none;display:none" data-i18n="login.oauth.github">
          🐙 使用 GitHub 登录
        </a>
      </div>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" style="display:none">
      <form onsubmit="doRegister();return false;" autocomplete="on">
        <div class="form-group">
          <label data-i18n="login.username">用户名</label>
          <input type="text" class="form-control" id="regUsername" data-i18n-placeholder="login.regUsernamePlaceholder"
            placeholder="3-20个字符，字母数字下划线" autocomplete="username">
        </div>
        <div class="form-group">
          <label data-i18n="login.email">邮箱</label>
          <input type="email" class="form-control" id="regEmail" data-i18n-placeholder="login.emailPlaceholder"
            placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label data-i18n="login.password">密码</label>
          <input type="password" class="form-control" id="regPassword"
            data-i18n-placeholder="login.regPasswordPlaceholder" placeholder="至少6个字符" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" data-i18n="login.regSubmit">注 册</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/theme.js"></script>
  <script>
    async function init() {
      if (api.isLoggedIn()) { location.href = '/panel.html'; return; }
      try {
        const cfg = await api.getConfig();
        document.getElementById('siteTitle').textContent = cfg.siteName;
        document.title = t('login.title') + ' - ' + cfg.siteName;
        if (!cfg.allowRegister) {
          document.getElementById('tabRegister').style.display = 'none';
        }
        if ((cfg.oauthEnabled && cfg.allowOauthRegister) || cfg.githubEnabled) {
          document.getElementById('oauthSection').style.display = 'block';
        }
        if (cfg.githubEnabled) {
          document.getElementById('githubLoginBtn').style.display = '';
        }
      } catch (e) { }

      const params = new URLSearchParams(location.search);
      if (params.get('tab') === 'register') showTab('register');
      if (params.get('error') === 'registration_closed') showToast(t('login.regClosed'), 'error');
    }

    function showTab(tab) {
      document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    }

    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!username || !password) return showToast(t('login.fillAll'), 'error');
      try {
        await api.login(username, password);
        location.href = '/panel.html';
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function doRegister() {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!username || !email || !password) return showToast(t('login.fillAll'), 'error');
      try {
        await api.register(username, email, password);
        showToast(t('login.regSuccess'), 'success');
        setTimeout(() => location.href = '/panel.html', 800);
      } catch (e) { showToast(e.message, 'error'); }
    }

    function onLangChange() {
      document.title = t('login.title');
    }

    init();
  </script>
</body>

</html>
