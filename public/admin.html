<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 域名分发站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <span class="icon">🌐</span>
                <span id="siteTitle">域名分发站</span>
            </a>
            <ul class="navbar-nav">
                <a href="/" class="btn btn-secondary btn-sm" data-i18n="nav.home">首页</a>
                <a href="/panel.html" class="btn btn-secondary btn-sm" data-i18n="nav.panel">控制面板</a>
                <a href="/admin.html" class="btn btn-secondary btn-sm active" data-i18n="nav.admin">管理后台</a>
                <button onclick="openAdminPasswordModal()" class="btn btn-secondary btn-sm"
                    data-i18n="nav.changePassword">修改密码</button>
                <button onclick="api.logout()" class="btn btn-secondary btn-sm" data-i18n="nav.logout">退出</button>
                <button id="langToggleBtn" class="btn btn-secondary btn-sm" title="Language">EN</button>
                <button id="themeToggleBtn" class="btn btn-secondary btn-sm" title="切换主题">☀️</button>
                <span id="navUsername" style="color:var(--text-secondary);font-size:0.85rem"></span>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 data-i18n="admin.heading">管理后台</h1>
            <p data-i18n="admin.desc">管理所有用户和域名记录</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="adminStats">
            <div class="stat-card">
                <div class="stat-value" id="statUsers">-</div>
                <div class="stat-label" data-i18n="admin.statUsers">注册用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statRecords">-</div>
                <div class="stat-label" data-i18n="admin.statRecords">域名记录</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statActive">-</div>
                <div class="stat-label" data-i18n="admin.statActive">活跃记录</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('records', this)" data-i18n="admin.tabRecords">📋
                域名记录</button>
            <button class="tab" onclick="switchTab('users', this)" data-i18n="admin.tabUsers">👥 用户管理</button>
            <button class="tab" onclick="switchTab('settings', this)" data-i18n="admin.tabSettings">⚙️ 系统设置</button>
        </div>

        <!-- Records Panel -->
        <div id="recordsPanel">
            <div class="card">
                <div class="card-header">
                    <h2 data-i18n="admin.recordList">记录列表</h2>
                    <div class="search-bar" style="margin:0">
                        <input type="text" style="display:none" autocomplete="username">
                        <input type="password" style="display:none" autocomplete="current-password">
                        <input type="search" class="form-control" id="searchInput"
                            data-i18n-placeholder="admin.searchPlaceholder" placeholder="搜索域名、记录值、用户名..."
                            oninput="debounceSearch()" style="max-width:300px" autocomplete="off">
                    </div>
                </div>
                <div class="card-body" id="recordsContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Users Panel -->
        <div id="usersPanel" class="hidden">
            <div class="card">
                <div class="card-header">
                    <h2 data-i18n="admin.userList">用户列表</h2>
                </div>
                <div class="card-body" id="usersContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="hidden">
            <div class="card" style="margin-bottom: 20px;">
                <div class="card-header">
                    <h2 data-i18n="settings.notifyTitle">📢 发送全站通知</h2>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <textarea class="form-control" id="globalNotifyMsg" rows="3"
                            data-i18n-placeholder="settings.notifyPlaceholder"
                            placeholder="填写要广播给所有用户的系统通知内容..."></textarea>
                    </div>
                    <button class="btn btn-warning" onclick="sendGlobalNotify()"
                        data-i18n="settings.notifyBtn">发送广播</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 data-i18n="settings.title">系统设置</h2>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                            <input type="checkbox" id="allowRegister">
                            <span data-i18n="settings.allowRegister">允许账号密码注册</span>
                        </label>
                        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:4px"
                            data-i18n="settings.allowRegisterHint">关闭后，用户将无法通过账号密码注册</p>
                    </div>
                    <div class="form-group">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                            <input type="checkbox" id="allowOauthRegister">
                            <span data-i18n="settings.allowOauth">允许 Linux.Do OAuth 注册</span>
                        </label>
                        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:4px"
                            data-i18n="settings.allowOauthHint">关闭后，新用户将无法通过 Linux.Do 登录注册，已有账号不受影响</p>
                    </div>
                    <div class="form-group">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                            <input type="checkbox" id="allowGithubRegister">
                            <span data-i18n="settings.allowGithub">允许 GitHub OAuth 注册</span>
                        </label>
                        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:4px"
                            data-i18n="settings.allowGithubHint">关闭后，新用户将无法通过 GitHub 登录注册，已有账号不受影响</p>
                    </div>
                    <div class="form-group">
                        <label data-i18n="settings.defaultQuota">新用户默认域名配额</label>
                        <input type="number" class="form-control" id="defaultQuota" min="0" placeholder="默认配额">
                        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:4px"
                            data-i18n="settings.defaultQuotaHint">新注册用户的默认域名数量限制，0 表示无限制</p>
                    </div>
                    <button class="btn btn-primary" onclick="saveSettings()" data-i18n="settings.save">保存设置</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p data-i18n="powered">Powered by Cloudflare DNS API</p>
        </footer>
    </div>

    <!-- Admin Edit Modal -->
    <div class="modal-overlay" id="adminEditModal" onclick="closeModal(event,'adminEditModal')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 data-i18n="adminEdit.title">编辑记录</h3>
                <button class="modal-close" onclick="closeModalById('adminEditModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="adminEditId">
                <div class="form-group">
                    <label data-i18n="adminEdit.domain">域名</label>
                    <input type="text" class="form-control" id="adminEditDomain" readonly>
                </div>
                <div class="form-group">
                    <label data-i18n="adminEdit.type">记录类型</label>
                    <input type="text" class="form-control" id="adminEditType" readonly>
                </div>
                <div class="form-group">
                    <label data-i18n="adminEdit.user">所属用户</label>
                    <input type="text" class="form-control" id="adminEditUser" readonly>
                </div>
                <div class="form-group">
                    <label data-i18n="adminEdit.value">记录值</label>
                    <input type="text" class="form-control" id="adminEditValue"
                        data-i18n-placeholder="adminEdit.valuePlaceholder" placeholder="新的记录值">
                </div>
                <div class="form-group">
                    <label data-i18n="adminEdit.remark">备注</label>
                    <input type="text" class="form-control" id="adminEditRemark">
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                        <input type="checkbox" id="adminEditProxied">
                        <span data-i18n="adminEdit.proxy">开启 Cloudflare 代理（小黄云）</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModalById('adminEditModal')"
                    data-i18n="cancel">取消</button>
                <button class="btn btn-primary" onclick="submitAdminEdit()" data-i18n="adminEdit.save">保存修改</button>
            </div>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div class="modal-overlay" id="passwordModal" onclick="closeModal(event,'passwordModal')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 data-i18n="adminPwd.title">重置密码</h3>
                <button class="modal-close" onclick="closeModalById('passwordModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="pwdUserId">
                <div class="form-group">
                    <label data-i18n="adminPwd.user">用户</label>
                    <input type="text" class="form-control" id="pwdUsername" readonly>
                </div>
                <div class="form-group">
                    <label data-i18n="adminPwd.newPassword">新密码</label>
                    <input type="password" class="form-control" id="pwdNewPassword" autocomplete="new-password"
                        data-i18n-placeholder="adminPwd.newPasswordPlaceholder" placeholder="至少 6 个字符">
                </div>
                <div class="form-group">
                    <label data-i18n="adminPwd.confirmPassword">确认密码</label>
                    <input type="password" class="form-control" id="pwdConfirm" autocomplete="new-password"
                        data-i18n-placeholder="adminPwd.confirmPlaceholder" placeholder="再次输入新密码">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModalById('passwordModal')"
                    data-i18n="cancel">取消</button>
                <button class="btn btn-primary" onclick="submitPasswordReset()"
                    data-i18n="adminPwd.submit">确认重置</button>
            </div>
        </div>
    </div>

    <!-- Quota Modal -->
    <div class="modal-overlay" id="quotaModal" onclick="closeModal(event,'quotaModal')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 data-i18n="adminQuota.title">修改域名配额</h3>
                <button class="modal-close" onclick="closeModalById('quotaModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="quotaUserId">
                <div class="form-group">
                    <label data-i18n="adminQuota.user">用户</label>
                    <input type="text" class="form-control" id="quotaUsername" readonly>
                </div>
                <div class="form-group">
                    <label data-i18n="adminQuota.label">域名配额</label>
                    <input type="number" class="form-control" id="quotaValue" min="0"
                        data-i18n-placeholder="adminQuota.placeholder" placeholder="留空使用默认配额">
                    <p style="color:var(--text-muted);font-size:0.85rem;margin-top:4px" data-i18n="adminQuota.hint">0
                        表示不限制，留空使用系统默认配额</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModalById('quotaModal')" data-i18n="cancel">取消</button>
                <button class="btn btn-primary" onclick="submitQuota()" data-i18n="save">保存</button>
            </div>
        </div>
    </div>

    <!-- Admin Password Modal -->
    <div class="modal-overlay" id="adminPasswordModal" onclick="closeModal(event,'adminPasswordModal')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 data-i18n="adminSelfPwd.title">修改管理员密码</h3>
                <button class="modal-close" onclick="closeModalById('adminPasswordModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label data-i18n="adminSelfPwd.oldPassword">原密码</label>
                    <input type="password" class="form-control" id="adminOldPassword" autocomplete="new-password"
                        data-i18n-placeholder="adminSelfPwd.oldPasswordPlaceholder" placeholder="请输入原密码">
                </div>
                <div class="form-group">
                    <label data-i18n="adminSelfPwd.newPassword">新密码</label>
                    <input type="password" class="form-control" id="adminNewPassword" autocomplete="new-password"
                        data-i18n-placeholder="adminSelfPwd.newPasswordPlaceholder" placeholder="至少6个字符">
                </div>
                <div class="form-group">
                    <label data-i18n="adminSelfPwd.confirmPassword">确认新密码</label>
                    <input type="password" class="form-control" id="adminConfirmPassword" autocomplete="new-password"
                        data-i18n-placeholder="adminSelfPwd.confirmPlaceholder" placeholder="再次输入新密码">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModalById('adminPasswordModal')"
                    data-i18n="cancel">取消</button>
                <button class="btn btn-primary" onclick="submitAdminPassword()"
                    data-i18n="adminSelfPwd.submit">确认修改</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/theme.js"></script>
    <script>
        let siteConfig = {};
        let recordsPage = 1;
        const recordsPageSize = 20;
        let usersPage = 1;
        const usersPageSize = 20;

        // 生成分页 HTML
        function renderPagination(page, pageSize, total, onPageChange) {
            const totalPages = Math.ceil(total / pageSize);
            if (totalPages <= 1) return '';
            let html = '<div class="pagination">';
            html += `<button class="page-btn" ${page <= 1 ? 'disabled' : ''} onclick="${onPageChange}(${page - 1})">‹</button>`;
            const range = [];
            range.push(1);
            let start = Math.max(2, page - 2);
            let end = Math.min(totalPages - 1, page + 2);
            if (start > 2) range.push('...');
            for (let i = start; i <= end; i++) range.push(i);
            if (end < totalPages - 1) range.push('...');
            if (totalPages > 1) range.push(totalPages);
            for (const p of range) {
                if (p === '...') { html += '<span class="page-ellipsis">…</span>'; }
                else { html += `<button class="page-btn ${p === page ? 'active' : ''}" onclick="${onPageChange}(${p})">${p}</button>`; }
            }
            html += `<button class="page-btn" ${page >= totalPages ? 'disabled' : ''} onclick="${onPageChange}(${page + 1})">›</button>`;
            html += `<span class="page-info">${t('total')} ${total} ${t('items')}</span>`;
            html += '</div>';
            return html;
        }

        async function init() {
            if (!api.isLoggedIn() || !api.isAdmin()) {
                window.location.href = '/';
                return;
            }

            try {
                siteConfig = await api.getConfig();
                document.getElementById('siteTitle').textContent = siteConfig.siteName;
                document.getElementById('navUsername').textContent = api.user.username;
                await Promise.all([loadStats(), loadRecords(), loadUsers()]);
            } catch (e) {
                showToast(t('panel.loadFailed') + ': ' + e.message, 'error');
            }
        }

        async function loadStats() {
            try {
                const data = await api.getAdminStats();
                document.getElementById('statUsers').textContent = data.totalUsers;
                document.getElementById('statRecords').textContent = data.totalRecords;
                document.getElementById('statActive').textContent = data.activeRecords;
            } catch (e) { console.error(e); }
        }

        function goRecordsPage(p) { recordsPage = p; loadRecords(document.getElementById('searchInput').value.trim()); }
        function goUsersPage(p) { usersPage = p; loadUsers(); }

        async function loadRecords(keyword = '') {
            const container = document.getElementById('recordsContainer');
            const locale = I18N.lang() === 'zh' ? 'zh-CN' : 'en-US';
            try {
                const data = await api.getAdminRecords(keyword, recordsPage, recordsPageSize);
                if (data.records.length === 0) {
                    container.innerHTML = `<div class="empty-state"><span class="empty-icon">📭</span><p>${t('admin.noRecords')}</p></div>`;
                    return;
                }
                container.innerHTML = `
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>${t('table.id')}</th>
                  <th>${t('table.domain')}</th>
                  <th>${t('table.type')}</th>
                  <th>${t('table.value')}</th>
                  <th>${t('table.proxy')}</th>
                  <th>${t('table.user')}</th>
                  <th>${t('table.remark')}</th>
                  <th>${t('table.createdAt')}</th>
                  <th>${t('table.actions')}</th>
                </tr>
              </thead>
              <tbody>
                ${data.records.map(r => `
                  <tr>
                    <td style="color:var(--text-muted)">${r.id}</td>
                    <td><strong>${r.subdomain}.${siteConfig.domain}</strong></td>
                    <td><span class="badge badge-info">${r.record_type}</span></td>
                    <td style="font-family:monospace;font-size:0.85rem">${r.record_value}</td>
                    <td>${r.proxied ? `<span class="badge badge-success">${t('badge.on')}</span>` : `<span class="badge badge-warning">${t('badge.disabled')}</span>`}</td>
                    <td style="color:var(--accent-secondary)">${r.username || '-'}</td>
                    <td style="color:var(--text-muted);max-width:120px;overflow:hidden;text-overflow:ellipsis">${r.remark || '-'}</td>
                    <td style="color:var(--text-muted);font-size:0.85rem;white-space:nowrap">${new Date(r.created_at + 'Z').toLocaleString(locale)}</td>
                    <td>
                      <div class="table-actions">
                        <button class="btn btn-secondary btn-sm" onclick='openAdminEdit(${JSON.stringify(r)})'>${t('edit')}</button>
                        <button class="btn ${r.status === 'admin_suspended' ? 'btn-success' : 'btn-warning'} btn-sm" onclick="toggleDomainStatus(${r.id}, '${r.status}')">
                          ${r.status === 'admin_suspended' ? t('action.restore') : t('action.suspend')}
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="adminDeleteRecord(${r.id})">${t('action.delete')}</button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          ${renderPagination(data.page, data.pageSize, data.total, 'goRecordsPage')}`;
            } catch (e) {
                container.innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
            }
        }

        async function loadUsers() {
            const container = document.getElementById('usersContainer');
            const locale = I18N.lang() === 'zh' ? 'zh-CN' : 'en-US';
            try {
                const data = await api.getAdminUsers(usersPage, usersPageSize);
                if (data.users.length === 0) {
                    container.innerHTML = `<div class="empty-state"><p>${t('admin.noUsers')}</p></div>`;
                    return;
                }
                container.innerHTML = `
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>${t('table.id')}</th>
                  <th>${t('table.username')}</th>
                  <th>${t('table.email')}</th>
                  <th>${t('table.role')}</th>
                  <th>${t('table.status')}</th>
                  <th>${t('table.domainCount')}</th>
                  <th>${t('table.quotaCol') || t('action.quotaBtn')}</th>
                  <th>${t('table.registeredAt')}</th>
                  <th>${t('table.actions')}</th>
                </tr>
              </thead>
              <tbody>
                ${data.users.map(u => `
                  <tr>
                    <td style="color:var(--text-muted)">${u.id}</td>
                    <td><strong>${u.username}</strong></td>
                    <td style="color:var(--text-muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${u.email}">${u.email}</td>
                    <td>${u.role === 'admin' ? `<span class="badge badge-info">${t('badge.admin')}</span>` : `<span class="badge badge-success">${t('badge.userRole')}</span>`}</td>
                    <td>${u.status === 'active' ? `<span class="badge badge-success">${t('badge.active')}</span>` : `<span class="badge badge-danger">${t('badge.banned')}</span>`}</td>
                    <td>${u.domainCount}</td>
                    <td>
                      <span style="color:${u.domainQuota > 0 && u.domainCount >= u.domainQuota ? 'var(--color-error)' : 'var(--text-muted)'}">
                        ${u.domainQuota === 0 ? t('badge.unlimited') : `${u.domainCount}/${u.domainQuota}`}
                      </span>
                    </td>
                    <td style="color:var(--text-muted);font-size:0.85rem;white-space:nowrap">${new Date(u.created_at + 'Z').toLocaleString(locale)}</td>
                    <td>
                      ${u.role !== 'admin' ? `
                        <div class="table-actions">
                          <button class="btn btn-secondary btn-sm" onclick="openPasswordReset(${u.id}, '${u.username}')">${t('action.resetPassword')}</button>
                          <button class="btn btn-secondary btn-sm" onclick="openQuotaModal(${u.id}, '${u.username}', ${u.domainQuota})">${t('action.quotaBtn')}</button>
                          <button class="btn ${u.status === 'active' ? 'btn-danger' : 'btn-success'} btn-sm"
                                  onclick="toggleUser(${u.id}, '${u.status === 'active' ? 'disabled' : 'active'}')">
                            ${u.status === 'active' ? t('action.suspend') : t('action.enable')}
                          </button>
                          <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, '${u.username}')">${t('action.delete')}</button>
                        </div>
                      ` : '<span style="color:var(--text-muted);font-size:0.8rem">-</span>'}
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          ${renderPagination(data.page, data.pageSize, data.total, 'goUsersPage')}`;
            } catch (e) {
                container.innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
            }
        }

        // Tabs
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('recordsPanel').classList.toggle('hidden', tab !== 'records');
            document.getElementById('usersPanel').classList.toggle('hidden', tab !== 'users');
            document.getElementById('settingsPanel').classList.toggle('hidden', tab !== 'settings');
            if (tab === 'settings') loadSettings();
        }

        // Search
        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                recordsPage = 1;
                loadRecords(document.getElementById('searchInput').value.trim());
            }, 400);
        }

        // Modal helpers
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModalById(id) { document.getElementById(id).classList.remove('active'); }
        function closeModal(e, id) { if (e.target === document.getElementById(id)) closeModalById(id); }

        // Admin Edit
        function openAdminEdit(record) {
            document.getElementById('adminEditId').value = record.id;
            document.getElementById('adminEditDomain').value = record.subdomain + '.' + siteConfig.domain;
            document.getElementById('adminEditType').value = record.record_type;
            document.getElementById('adminEditUser').value = record.username || '-';
            document.getElementById('adminEditValue').value = record.record_value;
            document.getElementById('adminEditRemark').value = record.remark || '';
            document.getElementById('adminEditProxied').checked = !!record.proxied;
            openModal('adminEditModal');
        }

        async function submitAdminEdit() {
            const id = document.getElementById('adminEditId').value;
            const recordValue = document.getElementById('adminEditValue').value.trim();
            const remark = document.getElementById('adminEditRemark').value.trim();
            const proxied = document.getElementById('adminEditProxied').checked;
            if (!recordValue) { showToast(t('adminEdit.enterValue'), 'error'); return; }
            try {
                await api.updateAdminRecord(id, { recordValue, proxied, remark });
                closeModalById('adminEditModal');
                showToast(t('admin.editSuccess'), 'success');
                await loadRecords(document.getElementById('searchInput').value.trim());
            } catch (e) { showToast(e.message, 'error'); }
        }

        // Actions
        async function toggleDomainStatus(id, currentStatus) {
            const isSuspended = currentStatus === 'admin_suspended';
            if (!confirm(isSuspended ? t('confirm.restoreDomain') : t('confirm.suspendDomain'))) return;
            try {
                await api.updateAdminRecordStatus(id, isSuspended ? 'active' : 'admin_suspended');
                showToast(isSuspended ? t('admin.domainRestored') : t('admin.domainSuspended'), 'success');
                await loadRecords(document.getElementById('searchInput').value.trim());
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function adminDeleteRecord(id) {
            if (!confirm(t('confirm.deleteDomain'))) return;
            try {
                await api.deleteAdminRecord(id);
                showToast(t('admin.deleteSuccess'), 'success');
                recordsPage = 1;
                await Promise.all([loadRecords(), loadStats()]);
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function toggleUser(id, status) {
            const isEnable = status === 'active';
            if (!confirm(isEnable ? t('confirm.enableUser') : t('confirm.disableUser'))) return;
            try {
                await api.updateUserStatus(id, status);
                showToast(isEnable ? t('admin.userEnabled') : t('admin.userDisabled'), 'success');
                await loadUsers();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function deleteUser(id, username) {
            if (!confirm(t('confirm.deleteUser', { name: username }))) return;
            try {
                await api.deleteUser(id);
                showToast(t('admin.userDeleted'), 'success');
                usersPage = 1;
                await Promise.all([loadUsers(), loadStats()]);
            } catch (e) { showToast(e.message, 'error'); }
        }

        // Password Reset
        function openPasswordReset(userId, username) {
            document.getElementById('pwdUserId').value = userId;
            document.getElementById('pwdUsername').value = username;
            document.getElementById('pwdNewPassword').value = '';
            document.getElementById('pwdConfirm').value = '';
            openModal('passwordModal');
        }

        async function submitPasswordReset() {
            const id = document.getElementById('pwdUserId').value;
            const password = document.getElementById('pwdNewPassword').value;
            const confirm = document.getElementById('pwdConfirm').value;
            if (!password || password.length < 6) {
                showToast(t('adminPwd.tooShort'), 'error'); return;
            }
            if (password !== confirm) {
                showToast(t('adminPwd.mismatch'), 'error'); return;
            }
            try {
                await api.resetUserPassword(id, password);
                closeModalById('passwordModal');
                showToast(t('adminPwd.success'), 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // Quota Modal
        function openQuotaModal(userId, username, currentQuota) {
            document.getElementById('quotaUserId').value = userId;
            document.getElementById('quotaUsername').value = username;
            document.getElementById('quotaValue').value = currentQuota !== null ? currentQuota : '';
            openModal('quotaModal');
        }

        async function submitQuota() {
            const id = document.getElementById('quotaUserId').value;
            const val = document.getElementById('quotaValue').value;
            const quota = val === '' ? null : parseInt(val);
            try {
                await api.updateUserQuota(id, quota);
                closeModalById('quotaModal');
                showToast(t('adminQuota.success'), 'success');
                await loadUsers();
            } catch (e) { showToast(e.message, 'error'); }
        }

        // Settings
        async function loadSettings() {
            try {
                const data = await api.getAdminSettings();
                document.getElementById('allowRegister').checked = data.settings.allow_register === 'true';
                document.getElementById('allowOauthRegister').checked = data.settings.allow_oauth_register === 'true';
                document.getElementById('allowGithubRegister').checked = data.settings.allow_github_register !== 'false';
                document.getElementById('defaultQuota').value = data.settings.default_domain_quota || '';
            } catch (e) { showToast(t('settings.loadFailed') + ': ' + e.message, 'error'); }
        }

        async function saveSettings() {
            const allowRegister = document.getElementById('allowRegister').checked;
            const allowOauthRegister = document.getElementById('allowOauthRegister').checked;
            const allowGithubRegister = document.getElementById('allowGithubRegister').checked;
            const defaultDomainQuota = document.getElementById('defaultQuota').value;
            try {
                await api.updateAdminSettings({ allowRegister, allowOauthRegister, allowGithubRegister, defaultDomainQuota });
                showToast(t('settings.success'), 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function sendGlobalNotify() {
            const msg = document.getElementById('globalNotifyMsg').value.trim();
            if (!msg) { showToast(t('settings.notifyEmpty'), 'error'); return; }
            if (!confirm(t('settings.notifyConfirm'))) return;
            try {
                const res = await api.sendGlobalNotification(msg);
                showToast(res.message, 'success');
                document.getElementById('globalNotifyMsg').value = '';
            } catch (e) { showToast(e.message, 'error'); }
        }

        // Admin Password
        function openAdminPasswordModal() {
            document.getElementById('adminOldPassword').value = '';
            document.getElementById('adminNewPassword').value = '';
            document.getElementById('adminConfirmPassword').value = '';
            openModal('adminPasswordModal');
        }

        async function submitAdminPassword() {
            const oldPassword = document.getElementById('adminOldPassword').value;
            const newPassword = document.getElementById('adminNewPassword').value;
            const confirmPassword = document.getElementById('adminConfirmPassword').value;
            if (!oldPassword || !newPassword) { showToast(t('adminSelfPwd.fillAll'), 'error'); return; }
            if (newPassword.length < 6) { showToast(t('adminSelfPwd.tooShort'), 'error'); return; }
            if (newPassword !== confirmPassword) { showToast(t('adminSelfPwd.mismatch'), 'error'); return; }
            try {
                await api.updateAdminPassword(oldPassword, newPassword);
                closeModalById('adminPasswordModal');
                showToast(t('adminSelfPwd.success'), 'success');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // 语言切换后重新渲染动态内容
        function onLangChange() {
            document.title = t('admin.title');
            loadRecords(document.getElementById('searchInput').value.trim());
            loadUsers();
        }

        init();
    </script>
</body>

</html>
